  <text x="64" y="378" fill="#F7F8FA" font-family="Segoe UI, Arial, sans-serif" font-size="70" font-weight="750" letter-spacing="-2.4">Different answers.</text>
  <text x="64" y="428" fill="#8A93A0" font-family="Segoe UI, Arial, sans-serif" font-size="23">Same buyer question. Same city. Dated snapshot.</text>
